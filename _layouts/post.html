---
layout: default
---
<div class="page-header">
  <div class="container">
    <h1>{{ page.title }}</h1>
    <p class="post-meta">
      <time datetime="{{ page.date | date: '%Y-%m-%d' }}">{{ page.date | date: "%d. %B %Y" }}</time>
    </p>
  </div>
</div>
<div class="page-content">
  <article class="post-content">
    {{ content }}
  </article>
</div>
